name: Deploy to GitHub Pages

# The game is a static site, so we just upload the repo as-is and publish it.
on:
  push:
    branches:
      - claude/good-game-3d-engine-m13prm
      - claude/wave-completion-features-5rp8w2
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # One-time setup: enable Pages in repo Settings -> Pages with
        # "Source: GitHub Actions". After that this deploys automatically.
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
