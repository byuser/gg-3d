name: Deploy to GitHub Pages

# The game is built from the src/** module tree into a hashed static bundle and
# the built `dist/` is published to GitHub Pages. The deploy gates on the fast
# verification pipeline (lint + typecheck + tests) so a red change never ships.
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + typecheck + tests) — never deploy red
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build static bundle
        run: npm run build
        env:
          # Opt-in Google Drive cloud saves (Task 15). The OAuth 2.0 Web-app
          # client id is injected here from a GitHub Actions variable (or secret)
          # named GOOGLE_CLIENT_ID, scoped to this `github-pages` environment, so
          # it is never hardcoded in the repo. Vite only exposes `VITE_`-prefixed
          # vars to the bundle, so we map it across. Unset ⇒ empty ⇒ cloud saves
          # ship cleanly disabled. A client id for a *public* web app is not a
          # secret (it is visible in the shipped JS), so a Variable is the natural
          # choice — but a Secret with the same name works too.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
