name: CI

# Multi-stage pipeline for the modular build (Task 9): install → lint →
# typecheck → unit/logic + functional (Vitest) → build → real-browser E2E
# (Playwright against the built static bundle). A change can never land (or
# deploy) red.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --checkJs)
        run: npm run typecheck

      - name: Unit + logic + functional tests (Vitest)
        run: npm test

      - name: Build static bundle (Vite)
        run: npm run build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: Real-browser E2E (Playwright) — shard ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      # Run all shards even if one fails so we get the full picture in one go.
      fail-fast: false
      matrix:
        # Shard the suite across N machines that run in parallel — this is the
        # E2E speed-up. Each machine runs ONE worker (playwright.config.js keeps
        # workers:1 to avoid software-WebGL boot contention that flakes the tests'
        # boot-readiness waits), so wall-clock ≈ (tests ÷ shards) × per-test time.
        # Add entries to scale wider — the `--shard` denominator below tracks the
        # matrix size automatically.
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded browser (keyed by the lockfile, which pins the
      # Playwright version) so a cache hit skips the multi-second browser
      # download; the install step below still ensures the OS deps are present.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E against the built site (shard ${{ matrix.shard }})
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Per-shard name so the parallel matrix jobs don't clobber one another.
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report
          retention-days: 7
